services:
  postgres:
    image: postgres:16
    container_name: budget-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: budget_user
      POSTGRES_PASSWORD: budget_pass
      POSTGRES_DB: budget_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongo:
    image: mongo:7
    container_name: budget-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: budget_user
      MONGO_INITDB_ROOT_PASSWORD: budget_pass
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/var/lib/mongodb/data

  backend:
    build: ./packages/backend
    container_name: budget-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://budget_user:budget_pass@postgres:5432/budget_db
      MONGO_URL: mongodb://budget_user:budget_pass@mongo:27017/budget_db?authSource=admin
      JWT_SECRET: super-secret-key-change-in-production
      PORT: 3000
    depends_on:
      - postgres
      - mongo

  frontend:
    build: ./packages/frontend
    container_name: budget-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus
    container_name: budget-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: budget-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning

volumes:
  postgres_data:
  mongo_data:
  grafana_data: